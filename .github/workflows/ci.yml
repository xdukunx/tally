name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run smoke tests
        run: PYTHONPATH=. python tests/test_smoke.py
      - name: Run batch-script tests
        run: PYTHONPATH=. python tests/test_batch.py
      - name: Run queue tests
        run: PYTHONPATH=. python tests/test_queue.py
      - name: Run daemon tests
        run: PYTHONPATH=. python tests/test_daemon.py
